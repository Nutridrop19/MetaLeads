<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Leads Sorter</title>
<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{margin:0;background:#f4f7fb;padding:24px}
.container{max-width:1200px;margin:auto}
.header{background:linear-gradient(135deg,#00BCD4,#0097A7);color:#fff;padding:24px;border-radius:16px}
.card,.stat,.tablewrap{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card{padding:20px;margin:20px 0}
textarea{width:100%;height:240px;padding:12px;border:1px solid #ccc;border-radius:10px}
button{padding:12px 18px;border:none;border-radius:10px;background:#00BCD4;color:#fff;cursor:pointer}
.stat{padding:16px;margin:16px 0;display:inline-block}
.num{font-size:28px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{background:#00BCD4;color:#fff;padding:12px;text-align:left}
td{padding:12px;border-bottom:1px solid #eee}
</style>
</head>
<body>
<div class="container">
<div class="header"><h2>Meta Leads Sorter</h2><p>Paste leads mentah lalu proses.</p></div>

<div class="stat">Total Leads: <span class="num" id="totalLeads">0</span></div>

<div class="card">
<textarea id="rawData" placeholder="Paste data Meta di sini"></textarea><br><br>
<button onclick="prosesLead()">PROSES LEADS</button>
</div>

<div class="tablewrap">
<table>
<thead>
<tr><th>NAMA</th><th>TELPON / WHATSAPP</th><th>CAMPAIGN / PRODI</th></tr>
</thead>
<tbody id="leadTable"></tbody>
</table>
</div>
</div>

<script>
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbxRMP-FwRaQ_wu0MhlNFxoMcQ2bJaJgB7sXAJZqVN-Int6uwLjxed2Xt1imTRg16NMh/exec";
let total=0;
const nomorTersimpan=new Set();

async function prosesLead(){
const raw=document.getElementById("rawData").value.trim();
if(!raw){alert("Paste data dulu");return;}
const blocks=raw.split("Pilih Prodi yang kamu minati");

for(const block of blocks){
if(!block.trim()) continue;

const lines=block.split("\n").map(v=>v.trim()).filter(v=>v);

let nama="", prodi=lines[0]||"", wa1="", wa2="";

for(let i=0;i<lines.length;i++){
if(lines[i]==="Nama") nama=lines[i+1]||"";
if(lines[i]==="Nomor Whatsapp Aktif") wa1=(lines[i+1]||"").replace("+62","0");
if(lines[i]==="Phone number") wa2=(lines[i+1]||"").replace("+62","0");
}

let waGabungan="";
if(wa1&&wa2){
waGabungan=(wa1!==wa2)?wa1+" / "+wa2:wa1;
}else{
waGabungan=wa1||wa2;
}

const nomorUtama=wa1||wa2;
if(!nomorUtama || nomorTersimpan.has(nomorUtama)) continue;

nomorTersimpan.add(nomorUtama);

document.getElementById("leadTable").insertAdjacentHTML("beforeend",
`<tr><td>${nama}</td><td>${waGabungan}</td><td>${prodi}</td></tr>`);

try{
await fetch(WEBAPP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nama:nama,wa:waGabungan,prodi:prodi})
});
}catch(e){console.error(e);}

total++;
}

document.getElementById("totalLeads").innerText=total;
document.getElementById("rawData").value="";
}
</script>
</body>
</html>
